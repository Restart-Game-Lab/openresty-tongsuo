name: OpenResty + Tongsuo CI/CD

on:
  push:
    branches: [main, master]
    paths: ['build/**', '.github/workflows/docker-build.yml']
  pull_request:
    branches: [main, master]
    paths: ['build/**', '.github/workflows/docker-build.yml']
  workflow_dispatch:
    inputs:
      tongsuo_version:
        description: 'Tongsuo version'
        default: '8.5.0-pre1'
      openresty_version:
        description: 'OpenResty version'
        default: '1.29.2.5'
      panel_app_revision:
        description: '1Panel app revision number'
        default: '0'
      ubuntu_codename:
        description: 'Ubuntu codename'
        default: 'noble'
      push_to_registry:
        description: 'Push to ghcr.io?'
        type: boolean
        default: true
  schedule:
    - cron: '0 6 * * 1'

env:
  REGISTRY: ghcr.io
  TONGSUO_VERSION: "8.5.0-pre1"
  OPENRESTY_VERSION: "1.29.2.5"
  PANEL_APP_REVISION: "0"
  UBUNTU_CODENAME: "noble"

jobs:
  # ============================================================
  # Job 1: 准备元数据
  # ============================================================
  prepare:
    name: "prepare / metadata"
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      image: ${{ steps.image-name.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - if: github.event_name == 'workflow_dispatch'
        run: |
          echo "TONGSUO_VERSION=${{ github.event.inputs.tongsuo_version }}" >> $GITHUB_ENV
          echo "OPENRESTY_VERSION=${{ github.event.inputs.openresty_version }}" >> $GITHUB_ENV
          echo "PANEL_APP_REVISION=${{ github.event.inputs.panel_app_revision }}" >> $GITHUB_ENV
          echo "UBUNTU_CODENAME=${{ github.event.inputs.ubuntu_codename }}" >> $GITHUB_ENV

      - id: image-name
        run: echo "image=${{ env.REGISTRY }}/${{ github.repository }}" >> $GITHUB_OUTPUT

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.OPENRESTY_VERSION }}-${{ env.PANEL_APP_REVISION }}-${{ env.UBUNTU_CODENAME }}-tongsuo
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=OpenResty Tongsuo
            org.opencontainers.image.description=OpenResty ${{ env.OPENRESTY_VERSION }} + Tongsuo ${{ env.TONGSUO_VERSION }} (SM2/SM3/SM4/TLCP/NTLS)
            org.opencontainers.image.vendor=OpenResty Tongsuo Community
            org.opencontainers.image.version=${{ env.OPENRESTY_VERSION }}-${{ env.PANEL_APP_REVISION }}-${{ env.UBUNTU_CODENAME }}-tongsuo
            tongsuo.version=${{ env.TONGSUO_VERSION }}
            openresty.version=${{ env.OPENRESTY_VERSION }}
            panel.revision=${{ env.PANEL_APP_REVISION }}
            ubuntu.codename=${{ env.UBUNTU_CODENAME }}

      - name: "build plan"
        run: |
          echo "========================================="
          echo "  Tongsuo   : ${{ env.TONGSUO_VERSION }}"
          echo "  OpenResty : ${{ env.OPENRESTY_VERSION }}"
          echo "  Tag       : ${{ env.OPENRESTY_VERSION }}-${{ env.PANEL_APP_REVISION }}-${{ env.UBUNTU_CODENAME }}-tongsuo"
          echo "  Image     : ${{ steps.image-name.outputs.image }}"
          echo "  Event     : ${{ github.event_name }}"
          echo "========================================="

  # ============================================================
  # Job 2: 编译镜像 (不推送)
  # ============================================================
  build:
    name: "build / compile"
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ./build/Dockerfile
          push: false
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            RESTY_OPENSSL_VERSION=${{ env.TONGSUO_VERSION }}
            RESTY_VERSION=${{ env.OPENRESTY_VERSION }}
            RESTY_J=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: 推送镜像到 ghcr.io
  # ============================================================
  push:
    name: "push / ghcr.io"
    needs: [prepare, build]
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_registry != 'false')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - id: login
        run: |
          for i in 1 2 3 4 5; do
            echo "ghcr.io login attempt $i/5..."
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin 2>&1; then
              echo "ghcr.io login OK (attempt $i)"
              exit 0
            fi
            [ $i -lt 5 ] && sleep $((5 * i))
          done
          echo "ghcr.io login FAILED after 5 attempts"
          exit 1

      - id: push-step
        uses: docker/build-push-action@v6
        with:
          context: ./build
          file: ./build/Dockerfile
          push: true
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            RESTY_OPENSSL_VERSION=${{ env.TONGSUO_VERSION }}
            RESTY_VERSION=${{ env.OPENRESTY_VERSION }}
            RESTY_J=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # attestation 已禁用 — 每次构建会往 registry 推送 attestation manifest，
      # 在 ghcr.io 包页面显示为一堆哈希命名的"版本"，对个人项目无实际价值。
      # 如需供应链安全审计，把 push-to-registry 改回 true 即可恢复。
      # - uses: actions/attest-build-provenance@v2
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
      #     subject-digest: ${{ steps.push-step.outputs.digest }}
      #     push-to-registry: true

  # ============================================================
  # Job 4: 拉取验证
  # ============================================================
  verify:
    name: "verify / pull-test"
    needs: [prepare, push]
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_registry != 'false')
    runs-on: ubuntu-latest
    steps:
      - run: |
          for i in 1 2 3 4 5; do
            echo "ghcr.io login attempt $i/5..."
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin 2>&1; then
              echo "ghcr.io login OK (attempt $i)"
              exit 0
            fi
            [ $i -lt 5 ] && sleep $((5 * i))
          done
          echo "ghcr.io login FAILED after 5 attempts"
          exit 1

      - run: docker pull "${{ needs.prepare.outputs.image }}:latest"

      - name: "verify / tongsuo version"
        run: |
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            /usr/local/openresty/openssl3/bin/openssl version

      - name: "verify / SM2 SM3 SM4"
        run: |
          echo "--- SM2 ---"
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            /usr/local/openresty/openssl3/bin/openssl ecparam -list_curves 2>&1 | grep -i sm2 || echo "SM2: missing"
          echo "--- SM3 ---"
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            bash -c "echo 'test' | /usr/local/openresty/openssl3/bin/openssl dgst -sm3"
          echo "--- SM4 ---"
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            /usr/local/openresty/openssl3/bin/openssl enc -sm4-cbc -help 2>&1 | head -1 || echo "SM4: missing"

      - name: "verify / openresty"
        run: |
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            /usr/local/openresty/nginx/sbin/nginx -V 2>&1 | grep -E "built with|nginx version"
          docker run --rm "${{ needs.prepare.outputs.image }}:latest" \
            /usr/local/openresty/nginx/sbin/nginx -t 2>&1

      - name: "summary"
        run: |
          echo "========================================="
          echo "  Build Complete"
          echo "  Image: ${{ needs.prepare.outputs.image }}"
          echo "  Tags:"
          echo "${{ needs.prepare.outputs.tags }}" | sed 's/^/    /'
          echo "========================================="
          echo "  docker pull ${{ needs.prepare.outputs.image }}:latest"
